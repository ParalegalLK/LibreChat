name: Build Desaram AI Prod Image

on:
  workflow_dispatch:
  push:
    branches:
      - desaram-ai-prod
    paths:
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'api/**'
      - 'client/**'
      - 'packages/**'
      - '.github/workflows/desaram-ai-prod-images.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize image owner (lowercase for GHCR)
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare environment
        run: cp .env.example .env

      - name: Build and push API image with cache
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          target: node
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/librechat-desaram-ai-prod:${{ github.sha }}
            ghcr.io/${{ env.OWNER_LC }}/librechat-desaram-ai-prod:latest
          cache-from: type=gha,scope=desaram-ai-prod
          cache-to: type=gha,mode=max,scope=desaram-ai-prod
